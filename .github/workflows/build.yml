name: Build

on:
    release:
        types: [ published ]

jobs:
    build:
        strategy:
            matrix:
                os: [ ubuntu-latest, macos-latest, windows-latest ]

        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@v4

            -   name: Setup GraalVM
                uses: graalvm/setup-graalvm@v1
                with:
                    java-version: "25"
                    distribution: "graalvm"

            -   name: Build native binary
                run: ./gradlew nativeCompile

            -   name: Rename binary
                shell: bash
                run: |
                    mkdir dist
                    cp build/native/nativeCompile/* dist/markbin-${{ matrix.os }}

            -   name: Upload!
                uses: softprops/action-gh-release@v2
                with:
                    files: dist/*