name: Build

permissions:
  contents: write

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      branch:
        required: true
        default: "main"
        description: "Branch to do shit on"
      tag:
        required: true
        description: "Release tag"

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "25"
          distribution: "graalvm-community"

      - name: Verify Java since this workflow has failed SO MUCH IT HURTS
        run: java -version

      - name: Build binary
        run: ./gradlew nativeCompile
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename binary
        shell: bash
        run: |
          mkdir -p dist
          cp build/native/nativeCompile/* dist/

      - name: "Upload!"
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          files: dist/*